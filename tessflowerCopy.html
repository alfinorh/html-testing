<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lily & Love Celebration - Princess Birthdayy!!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: linear-gradient(120deg, #fff0f3, #ffffff, #fff0f3);
            background-size: 200% 200%;
            animation: moveGradient 10s ease infinite;
            font-family: 'Poppins', sans-serif;
            touch-action: none; /* KRUSIAL: Agar jejak bintang 🌸 lancar */
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(255, 77, 109, 0.25);
            text-align: center;
            width: 300px;
            border: 2px solid #ffcad4;
            backdrop-filter: blur(10px);
            user-select: none;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff4d6d;
            margin: 0 0 10px 0;
            font-size: 34px;
        }

        #typewriter {
            color: #888;
            font-size: 14px;
            min-height: 45px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn-celebrate {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer !important;
            box-shadow: 0 5px 25px rgba(255, 77, 109, 0.4);
            position: relative;
            z-index: 9999;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-celebrate:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <!-- SLOT MUSIK PADUKA RAJA (Ganti src="..." dengan link MP3 Paduka) -->
    <audio id="myAudio" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-romantic-vibe-147.mp3" type="audio/mpeg">
    </audio>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="card">
            <h1>Special For Princess 🌸</h1>
            <div id="typewriter"></div>
            <button id="btn" class="btn-celebrate">KLIK DISINI ✨</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btn');
        const audio = document.getElementById('myAudio');
        const textElement = document.getElementById('typewriter');
        
        let particles = [];
        const pesannya = "Gerakin jari kamu di layar, terus tekan tombolnya buat kejutan spesial dari aku... 🌸💞​";

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- EFEK NGETIK ---
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < pesannya.length) {
                textElement.innerHTML += pesannya.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;

        // --- SISTEM PARTIKEL (🌸, ❤️, ✨) ---
        class Particle {
            constructor(x, y, isBurst, type = 'lily') {
                this.x = x;
                this.y = y;
                this.isBurst = isBurst;
                this.type = type; 
                
                if (isBurst) {
                    const angle = Math.random() * Math.PI * 2;
                    const force = Math.random() * 4 + 2;
                    this.vx = Math.cos(angle) * force;
                    this.vy = Math.sin(angle) * force;
                    this.life = 1;
                    this.decay = Math.random() * 0.02 + 0.01;
                    this.size = Math.random() * 20 + 20;
                } else if (type === 'trail') {
                    // JEJAK BINTANG ✨
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2;
                    this.life = 1;
                    this.decay = 0.035;
                    this.size = Math.random() * 15 + 10;
                } else {
                    // HUJAN LILY 🌸
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = Math.random() * 2 + 1;
                    this.life = 1;
                    this.decay = 0;
                    this.size = Math.random() * 18 + 15;
                }
                
                this.rotation = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.1;
                this.emoji = type === 'heart' ? '💞' : (type === 'trail' ? '🦋' : '🌸');
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.isBurst || this.type === 'trail') {
                    if(this.isBurst) this.vy += 0.22; // Gravitas ledakan
                    this.life -= this.decay;
                } else {
                    if (this.y > canvas.height + 30) this.y = -30;
                }
                this.rotation += this.spin;
            }
        }

        // Hujan Lily Background
        for(let i=0; i<30; i++) {
            particles.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height, false));
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 25; i++) particles.push(new Particle(x, y, true, 'lily'));
            for (let i = 0; i < 15; i++) particles.push(new Particle(x, y, true, 'heart'));
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if ((p.isBurst || p.type === 'trail') && p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(loop);
        }
        loop();

        // --- TRACKING JEJAK JARI 🦋 ---
        const handleMove = (e) => {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            if (x && y) {
                particles.push(new Particle(x, y, false, 'trail'));
            }
        };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});

        // --- TOMBOL SAKTI ---
        const trigger = (e) => {
            // Musik diputar saat interaksi klik
            audio.play().catch(() => {
                console.log("Paduka Raja, browser butuh klik nyata untuk memutar suara.");
            });
            
            const rect = btn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            createExplosion(x, y);
            
            // Ledakan tambahan di sekitar layar
            setTimeout(() => createExplosion(Math.random()*canvas.width, Math.random()*canvas.height*0.5), 200);

            btn.innerText = "YEAAYYYY! 🎆";
            setTimeout(() => btn.innerText = "LAGI? ✨", 1500);
        };

        btn.onclick = trigger;
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            trigger(e);
        });

    </script>
</body>
</html>
