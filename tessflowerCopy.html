<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hikayat Lily - Paduka Raja</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff5f8; font-family: 'Poppins', sans-serif; touch-action: none; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 10; }
        
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 15px 50px rgba(255, 77, 109, 0.2); 
            text-align: center; 
            width: 300px; 
            border: 2px solid #ffcad4; 
            backdrop-filter: blur(10px);
            transition: all 0.8s ease;
        }

        .photo-container { width: 110px; height: 110px; margin: 0 auto 15px auto; border-radius: 50%; border: 4px solid #ff9a9e; overflow: hidden; display: none; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { font-family: 'Dancing Script', cursive; color: #ff4d6d; margin: 0; font-size: 30px; display: none; }
        #typewriter { color: #888; font-size: 14px; min-height: 60px; margin: 20px 0; line-height: 1.6; }
        
        .btn-action { 
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3); 
            color: white; border: none; padding: 12px 30px; 
            font-size: 15px; font-weight: 700; border-radius: 50px; 
            cursor: pointer !important; box-shadow: 0 5px 20px rgba(255, 77, 109, 0.3); 
            z-index: 9999; -webkit-tap-highlight-color: transparent; 
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="myAudio" preload="auto" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/07/Rainy-Day-Lofi-Chill-Medium.mp3" type="audio/mpeg">
    </audio>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="card" id="mainCard">
            <h1 id="mainTitle">Special for Princess 🌸</h1>
            <div class="photo-container" id="photoBox">
                <img src="https://files.catbox.moe/namafotoanda.jpg" alt="Surprise">
            </div>
            <div id="typewriter"></div>
            <button id="nextBtn" class="btn-action">Lanjut ✨</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nextBtn = document.getElementById('nextBtn');
        const audio = document.getElementById('myAudio');
        const textElement = document.getElementById('typewriter');
        const photoBox = document.getElementById('photoBox');
        const mainTitle = document.getElementById('mainTitle');
        
        let particles = [];
        let step = 0;

        // --- ALUR CERITA PADUKA RAJA ---
        const story = [
            "Hai... Ada sesuatu yang mau gue kasih tau ke lo.",
            "Sebenernya, setiap hari yang gue lewati bareng lo itu berharga banget...",
            "Makasih ya udah selalu ada dan bikin hari-hari gue jadi lebih berwarna.",
            "Semoga kejutan kecil ini bisa bikin lo senyum hari ini. Siap?"
        ];

        function typeWriter(text, i, fnCallback) {
            if (i < text.length) {
                textElement.innerHTML = text.substring(0, i + 1) + '<span aria-hidden="true"></span>';
                setTimeout(() => typeWriter(text, i + 1, fnCallback), 50);
            } else if (typeof fnCallback == 'function') {
                setTimeout(fnCallback, 700);
            }
        }

        function nextStep() {
            if (step < story.length) {
                typeWriter(story[step], 0, () => {
                    nextBtn.style.display = "inline-block";
                });
                nextBtn.style.display = "none";
                step++;
            } else {
                // THE FINAL REVEAL
                textElement.innerHTML = "Klik tombol di bawah dan gerakin jari lo di layar! 💞";
                photoBox.style.display = "block";
                mainTitle.style.display = "block";
                nextBtn.innerHTML = "KLIK DISINI ✨";
                nextBtn.onclick = finalCelebration;
            }
        }

        function finalCelebration() {
            audio.play();
            const rect = nextBtn.getBoundingClientRect();
            createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);
            setTimeout(() => createExplosion(Math.random()*canvas.width, Math.random()*canvas.height*0.5), 200);
            nextBtn.innerText = "YEAAYYYYY! 🎆";
        }

        nextBtn.onclick = nextStep;
        window.onload = nextStep;

        // --- SISTEM PARTIKEL (Lily 🌸, Heart ❤️, Trail 🦋) ---
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(x, y, isBurst, type = 'lily') {
                this.x = x; this.y = y; this.isBurst = isBurst; this.type = type;
                if (isBurst) {
                    const angle = Math.random() * Math.PI * 2;
                    const force = Math.random() * 4 + 2; 
                    this.vx = Math.cos(angle) * force; this.vy = Math.sin(angle) * force;
                    this.life = 1; this.decay = Math.random() * 0.01 + 0.005; this.size = Math.random() * 20 + 20;
                } else if (type === 'trail') {
                    this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
                    this.life = 1; this.decay = 0.035; this.size = Math.random() * 15 + 10;
                } else {
                    this.vx = (Math.random() - 0.5) * 2; this.vy = Math.random() * 2 + 1;
                    this.life = 1; this.decay = 0; this.size = Math.random() * 15 + 15;
                }
                this.rotation = Math.random() * Math.PI * 2; this.spin = (Math.random() - 0.5) * 0.1;
                this.emoji = type === 'heart' ? '💞' : (type === 'trail' ? '🦋' : '🌸');
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.life; ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                ctx.font = `${this.size}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0); ctx.restore();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.isBurst || this.type === 'trail') { if(this.isBurst) this.vy += 0.22; this.life -= this.decay; }
                else { if (this.y > canvas.height + 30) this.y = -30; }
                this.rotation += this.spin;
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 25; i++) particles.push(new Particle(x, y, true, 'lily'));
            for (let i = 0; i < 15; i++) particles.push(new Particle(x, y, true, 'heart'));
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if ((p.isBurst || p.type === 'trail') && p.life <= 0) particles.splice(i, 1); });
            requestAnimationFrame(loop);
        }
        loop();

        const handleMove = (e) => {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            if (x && y) particles.push(new Particle(x, y, false, 'trail'));
        };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});

        // Hujan background (Lily)
        setInterval(() => {
            if (particles.filter(p => !p.isBurst && p.type === 'lily').length < 20) {
                particles.push(new Particle(Math.random()*canvas.width, -30, false, 'lily'));
            }
        }, 1000);
    </script>
</body>
</html>
