<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #fdf6f6; /* Warna pink pastel lembut */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            z-index: 10;
        }

        .lily-icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            animation: sway 3s ease-in-out infinite;
        }

        h1 {
            color: #d4a5a5;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #777;
            line-height: 1.6;
        }

        /* Animasi Bunga Bergoyang */
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Hiasan Bunga Lily Melayang di Background */
        .floating-lily {
            position: absolute;
            font-size: 25px;
            color: rgba(212, 165, 165, 0.3);
            user-select: none;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Background Animasi -->
    <script>
        function createLily() {
            const lily = document.createElement('div');
            lily.classList.add('floating-lily');
            lily.innerHTML = '⚜️'; // Simbol Lily
            lily.style.left = Math.random() * 100 + 'vw';
            lily.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(lily);

            setTimeout(() => {
                lily.remove();
            }, 10000);
        }
        setInterval(createLily, 500);
    </script>

    <div class="card">
        <div class="lily-icon">⚜️</div>
        <h1>Halo!</h1>
        <p>Cuman mau kasih bunga Lily virtual ini buat nemenin hari lo. Semoga hari lo menyenangkan ya! ✨</p>
        <p style="font-size: 12px; color: #bbb; margin-top: 20px;">- Dibuat dengan antusias -</p>
    </div>

</body>
</html>
